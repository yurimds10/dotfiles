# vim:ft=kitty
## name: Gruvbox Material Dark Medium
## author: Sainnhe Park
## license: MIT
## upstream: https://raw.githubusercontent.com/rsaihe/gruvbox-material-kitty/main/colors/gruvbox-material-dark-medium.conf
## blurb: A modified version of Gruvbox with softer contrasts


##:Font Style
font_family FantasqueSansM Nerd Font
bold_font true
font_size 12

background #1d2021
foreground #d4be98

selection_background #d4be98
selection_foreground #1d2021


#:Cursor customization
cursor #a89984
cursor_text_color background


#:Window layout
remember_window_size  no
window_margin_width 10
confirm_os_window_close 0


# Black
color0 #665c54
color8 #928374

# Red
color1 #ea6962
color9 #ea6962

# Green
color2  #a9b665
color10 #a9b665

# Yellow
color3  #e78a4e
color11 #d8a657

# Blue
color4  #7daea3
color12 #7daea3

# Magenta
color5  #d3869b
color13 #d3869b

# Cyan
color6  #89b482
color14 #89b482

# White
color7  #d4be98
color15 #d4be98


#:Extra
shell_integration disabled
editor nvim
allow_remote_control yes
disable_ligatures never


#:Keymaps
kitty_mod ctrl+shift

#: map kitty_mod+c copy_to_clipboard
#: map ctrl+v paste_from_clipboard
map kitty_mod+q close_window
map kitty_mod+d next_window
map kitty_mod+a previous_window
map kitty_mod+w move_window_forward
map kitty_mod+s move_window_backward
map kitty_mod+z new_tab
map kitty_mod+x close_tab
